[pytest]
# Pytest configuration for pharmaco-navigator backend tests

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 8.0

# Add backend directory to Python path
pythonpath = .

# Verbose output settings
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers for categorizing tests
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    unit: marks tests as unit tests (deselect with '-m "not unit"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: marks tests as end-to-end (require live Azure DB; deselect with '-m "not e2e"')
    e2e_fhir: marks tests needing CERNER_E2E_ACCESS_TOKEN (deselect with '-m "not e2e_fhir"')

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage settings
testpaths = tests
